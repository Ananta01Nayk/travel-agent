version: "3.9"

services:

  backend:

    build: .

    container_name: travel-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./chroma_db:/app/chroma_db

  frontend:

    build: ./frontend

    container_name: travel-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend